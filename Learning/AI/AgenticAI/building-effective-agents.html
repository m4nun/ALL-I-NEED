<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Effective Agents with LangGraph</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1a1a2e;--ink-light:#4a4a68;--accent:#e94560;--accent2:#4361ee;--ground:#fafafa;--ground-alt:#f0f0f5}
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body{font-family:'Inter',system-ui,sans-serif;background:var(--ground);color:var(--ink);min-height:100vh;overflow-x:hidden}
    .visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#d0d0dd;border-radius:3px}
    #app{min-height:100vh;display:flex;flex-direction:column}
    #content{flex:1;padding-top:56px;padding-bottom:80px}
    .beat-wrap{padding:12px 0}
    .beat-wrap:first-child{padding-top:24px}
    .beat-wrap:last-child{padding-bottom:32px}
    .beat-inner{max-width:780px;margin:0 auto;padding:0 24px;opacity:0;transform:translateY(20px);transition:opacity .5s ease-out,transform .5s ease-out}
    .beat-inner.visible{opacity:1;transform:translateY(0)}
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,250,.88);backdrop-filter:blur(8px);border-bottom:1px solid #e8e8ee;padding:10px 24px}
    .top-bar-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:12px}
    .dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .3s;cursor:pointer}
    .dot.active{background:var(--accent2);transform:scale(1.25)}
    .dot.done{background:#9ca3cf}
    .counter{font-size:12px;color:#999;font-weight:600;margin-left:auto;font-variant-numeric:tabular-nums}
    .bot-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(250,250,250,.88);backdrop-filter:blur(8px);border-top:1px solid #e8e8ee;padding:12px 24px}
    .bot-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    #backBtn{padding:6px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:var(--ink-light);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none}
    #backBtn.show{opacity:1;pointer-events:auto}
    #backBtn:hover{background:var(--ground-alt);border-color:#ccc}
    .hint{font-size:11px;color:#bbb;font-weight:500}
    h1{font-size:32px;font-weight:800;color:var(--ink);letter-spacing:-.5px;line-height:1.2}
    h2{font-size:20px;font-weight:700;color:var(--ink);line-height:1.3}
    .sub{color:var(--ink-light);font-size:15px;line-height:1.5}
    .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent2);color:#fff;margin-bottom:8px}
    svg{display:block;max-width:100%;height:auto}
    .fig{background:#fff;border-radius:16px;border:1px solid #e8e8ee;padding:24px;overflow:hidden}
    .fig-sm{padding:16px}
    @keyframes drawLine{to{stroke-dashoffset:0}}
    @keyframes fadeIn{to{opacity:1}}
    @keyframes popIn{to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
    .a-fade{opacity:0;animation:fadeIn .5s ease-out forwards}
    .a-pop{opacity:0;transform:scale(.8);animation:popIn .4s ease-out forwards}
    .a-up{opacity:0;transform:translateY(12px);animation:slideUp .5s ease-out forwards}
    .a-line path{stroke-dasharray:800;stroke-dashoffset:800;animation:drawLine .8s ease-out forwards}
    .a-line2 path{stroke-dasharray:400;stroke-dashoffset:400;animation:drawLine .6s ease-out forwards}
    .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}.d4{animation-delay:.6s}.d5{animation-delay:.75s}.d6{animation-delay:.9s}.d7{animation-delay:1.05s}
    .pulse{animation:pulse 2s ease-in-out infinite}
    .wrap-text{overflow-wrap:break-word;word-break:break-word}
  </style>
</head>
<body>
<figure class="explainer-visual" role="img" aria-label="Interactive visual explainer of Building Effective Agents with LangGraph">
  <figcaption class="visually-hidden">Step-through diagrams explaining workflow vs agent patterns, LangGraph infrastructure, augmented LLMs, prompt chaining, routing, parallelization, orchestrator-worker, evaluator-optimizer, and the agent tool-calling loop.</figcaption>
</figure>

<div id="app">
  <div class="top-bar"><div class="top-bar-inner"><div id="dotBar" style="display:flex;gap:6px"></div><span class="counter" id="counter">0/0</span></div></div>
  <div id="content"><div id="beatsContainer" style="max-width:780px;margin:0 auto"></div></div>
  <div class="bot-bar"><div class="bot-inner"><button id="backBtn">← Back</button><span class="hint">Click · Space · →</span><div style="width:72px"></div></div></div>
</div>

<script>
const beats = [
  // ===== 1: TITLE =====
  {render:()=>`
    <div class="beat-wrap"><div class="beat-inner" style="padding-top:32px">
      <div class="text-center">
        <h1 style="font-size:38px">Building Effective<br>Agents</h1>
        <p class="sub" style="margin-top:8px">Anthropic's blog post — built from scratch with LangGraph</p>

      </div>
      <!-- Simple decorative line -->
      <svg width="80" height="4" viewBox="0 0 80 4" style="margin:24px auto 0">
        <rect width="80" height="4" rx="2" fill="var(--accent2)" opacity=".3"/>

  `},

  // ===== 2: WORKFLOW vs AGENT diagram =====
  {render:()=>`

            <text x="575" y="118" font-size="10" fill="var(--ink-light)" text-anchor="middle">API auto-generated</text>
            <text x="575" y="134" font-size="10" fill="var(--ink-light)" text-anchor="middle">5 minutes to prod</text>

  // ===== 4: AUGMENTED LLM =====

        <svg viewBox="0 0 700 200" style="width:100%">

            <rect x="370" y="20" width="290" height="150" rx="12" fill="#fff" stroke="#ddd" stroke-width="1.5"/>

  // ===== 5: FIVE PATTERNS OVERVIEW =====

  // ===== 6: PROMPT CHAINING + ROUTING diagrams =====
  {render:()=>`

        <svg viewBox="0 0 700 260" style="width:100%">

let currentIndex = -1;
let backStack = [];

function renderDotBar() {
  const bar = document.getElementById('dotBar');
  const total = beats.length;
  bar.innerHTML = beats.map((b,i)=>
    `<div class="dot ${i<=currentIndex?(i===currentIndex?'active':'done'):''}" data-index="${i}"></div>`
  ).join('');
  document.getElementById('counter').textContent = `${currentIndex+1}/${total}`;
}

function advance() {
  if (currentIndex >= beats.length - 1) return;
  backStack.push(currentIndex);
  currentIndex++;
  appendBeat(currentIndex);
  renderDotBar();
  updateBackBtn();
}

function goBack() {
  if (backStack.length === 0) return;
  currentIndex = backStack.pop();
  trimBeats();
  renderDotBar();
  updateBackBtn();
}

function appendBeat(index) {
  const container = document.getElementById('beatsContainer');
  const temp = document.createElement('div');
  temp.innerHTML = beats[index].render();
  const el = temp.firstElementChild;
  container.appendChild(el);
  requestAnimationFrame(() => {
    const inner = el.querySelector('.beat-inner');
    if (inner) {
      inner.classList.add('visible');
      inner.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  });
}

function trimBeats() {
  const container = document.getElementById('beatsContainer');
  while (container.children.length > currentIndex + 1) {
    container.removeChild(container.lastChild);
  }
}

function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  btn.classList.toggle('show', backStack.length > 0);
}

// Events
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); advance(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});
document.getElementById('app').addEventListener('click', e => {
  if (e.target.closest('#backBtn, .bot-bar, .top-bar, .dot')) return;
  advance();
});
document.getElementById('backBtn').addEventListener('click', e => { e.stopPropagation(); goBack(); });

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 60) dx < 0 ? advance() : goBack();
});

// Init
renderDotBar();
</script>
